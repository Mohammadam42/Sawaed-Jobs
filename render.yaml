services:
  - type: web
    name: sawaed-commercial-website
    env: node
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production node server.mjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERS
        value: Admin,admin,Mohammad
      - key: PUBLIC_SITE_URL
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
